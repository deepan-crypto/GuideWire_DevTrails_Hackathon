services:
  - type: web
    name: riskwire-rag-chatbot
    env: python
    plan: free
    pythonVersion: 3.12.0
    buildCommand: pip install --upgrade setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: GEMINI_API_KEY
        scope: build
        # User should set this in Render dashboard environment variables
