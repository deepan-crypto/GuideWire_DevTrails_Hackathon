spring.application.name=riskwire
server.port=8080
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/riskwire?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
oracle.base-url=https://guidewire-devtrails-hackathon.onrender.com
spring.task.scheduling.enabled=true
